name: Threads Auto Post

on:
  schedule:
    # 【朝スロット】曜日ごとに投稿時刻を変えて人間味を出す
    - cron: "0 22 * * 0,3"    # 月・木: JST 7:00  (UTC日・水 22:00)
    - cron: "30 22 * * 1,4"   # 火・金: JST 7:30  (UTC月・木 22:30)
    - cron: "15 23 * * 2,5,6" # 水・土・日: JST 8:15 (UTC火・金・土 23:15)
    # 【夜スロット】曜日ごとに投稿時刻を変える（金曜は誘導型）
    - cron: "0 12 * * 1,3,5"  # 月・水・金: JST 21:00 (UTC 12:00)
    - cron: "30 13 * * 2,4,6" # 火・木・土: JST 22:30 (UTC 13:30)
    - cron: "0 14 * * 0"      # 日: JST 23:00 (UTC 14:00)

  workflow_dispatch:
    inputs:
      dry_run:
        description: "ドライラン（実際には投稿しない）"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      post_slot:
        description: "投稿スロット（空欄で自動判定）"
        required: false
        default: ""
        type: choice
        options:
          - ""
          - "morning"
          - "evening"

jobs:
  post:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # posts.json の used フラグ更新のため

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Run post script
        env:
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
          POST_SLOT: ${{ github.event.inputs.post_slot || '' }}
        run: python post.py

      - name: Commit updated logs and post status
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/posts.json logs/post_log.json
          git diff --cached --quiet || git commit -m "chore: update post log [skip ci]"
          git push
